<div class="card">
  <h1>{{ mode() === "login" ? "Sign in" : "Create account" }}</h1>
  <p class="hint">Demo app — backend stores users in memory until restart.</p>

  <div class="tabs">
    <button
      type="button"
      [class.active]="mode() === 'login'"
      (click)="setMode('login')"
    >
      Login
    </button>
    <button
      type="button"
      [class.active]="mode() === 'register'"
      (click)="setMode('register')"
    >
      Register
    </button>
  </div>

  @if (error()) {
    <p class="error" role="alert">{{ error() }}</p>
  }

  <form (ngSubmit)="submit()">
    <label>
      <span>Email</span>
      <input
        name="email"
        type="email"
        autocomplete="email"
        [(ngModel)]="email"
        [disabled]="loading()"
      />
    </label>
    <label>
      <span>Password</span>
      <input
        name="password"
        type="password"
        autocomplete="current-password"
        [(ngModel)]="password"
        [disabled]="loading()"
      />
    </label>
    <button type="submit" class="primary" [disabled]="loading()">
      {{ loading() ? "Please wait…" : mode() === "login" ? "Sign in" : "Register" }}
    </button>
  </form>
</div>
